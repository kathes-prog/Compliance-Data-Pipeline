{% extends "base.html" %}
{% block title %}Upload — Netter Pipeline{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Upload Attendance Data</h1>
</div>

<form method="POST" action="/upload" enctype="multipart/form-data" class="upload-form">
    <div class="form-group">
        <label for="file">Attendance File (Excel or CSV)</label>
        <div class="drop-zone" id="dropZone">
            <span>Drag and drop file here, or <label for="file" class="link">browse</label></span>
            <input type="file" id="file" name="file" accept=".xlsx,.xls,.csv" required>
        </div>
        <div id="fileChosen" class="file-chosen"></div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="program">Program</label>
            <input type="text" id="program" name="program" placeholder="e.g. After School Literacy" required>
        </div>
        <div class="form-group">
            <label for="school">School</label>
            <input type="text" id="school" name="school" placeholder="e.g. West Philadelphia High" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="">Select a category</option>
                <option value="literacy">Literacy</option>
                <option value="stem">STEM</option>
                <option value="health">Health</option>
                <option value="arts">Arts</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="date_range">Date Range</label>
            <input type="text" id="date_range" name="date_range" placeholder="e.g. Sep 2024 – Jan 2025">
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Upload and Validate</button>
</form>
{% endblock %}
